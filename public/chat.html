<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Citizen | Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #2563eb; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; --bg-light: #f3f4f6; --bg-white: #ffffff; --text-dark: #1e293b; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg-light); color: var(--text-dark); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 450px; background: var(--bg-white); display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.05); z-index: 1000; box-shadow: 2px 0 15px rgba(0,0,0,0.05); }
        .header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: white; }
        .brand { font-size: 1.4rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .user-controls { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: #64748b; }
        .btn-logout { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1rem; padding: 5px; }

        /* City Pulse Stats */
        .city-pulse { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px 20px; background: #f8fafc; border-bottom: 1px solid #eee; }
        .pulse-card { background: white; padding: 8px; border-radius: 8px; border: 1px solid #e2e8f0; text-align: center; font-size: 0.75rem; color: #64748b; }
        .pulse-val { display: block; font-weight: 700; font-size: 0.9rem; color: var(--text-dark); margin-top: 2px; }
        .pulse-good { color: var(--success); } .pulse-mod { color: var(--warning); }

        /* Service Grid Buttons */
        .service-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px 20px; }
        .svc-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 5px; cursor: pointer; font-size: 0.75rem; font-weight: 600; color: #475569; }
        .svc-btn:hover { background: #eff6ff; border-color: var(--primary); color: var(--primary); transform: translateY(-2px); }
        .svc-btn i { font-size: 1.2rem; margin-bottom: 2px; }

        /* Chat Area */
        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; background: #fff; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .msg.bot { background: #f1f5f9; color: #334155; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.emergency { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; align-self: center; width: 100%; text-align: center; font-weight: 600; }

        /* Service Cards in Chat */
        .service-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-top: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .card-name { font-weight: 700; font-size: 0.95rem; color: #1e293b; }
        .card-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #e2e8f0; color: #475569; font-weight: 600; }
        
        .live-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; background: #f8fafc; padding: 6px; border-radius: 6px; margin: 8px 0; color: #475569; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-green { background: var(--success); box-shadow: 0 0 0 2px #dcfce7; }
        .dot-orange { background: var(--warning); box-shadow: 0 0 0 2px #fef3c7; }

        .card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .btn-act { flex: 1; padding: 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-nav { background: white; border: 1px solid #cbd5e1; color: #475569; }
        .btn-visit { background: var(--primary); color: white; }

        /* Input Area */
        .input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; background: white; }
        .inp { flex: 1; padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 25px; outline: none; }
        .btn-sos-main { width: 45px; height: 45px; border-radius: 50%; background: var(--danger); color: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; animation: pulse 2s infinite; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }

        #map { flex: 1; height: 100%; }
        @media (max-width: 768px) { body { flex-direction: column-reverse; } .sidebar { width: 100%; height: 60%; } }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: white; width: 90%; max-width: 400px; border-radius: 16px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: 700; color: #1e293b; }
        .btn-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #64748b; }
        .modal label { font-size: 0.85rem; font-weight: 600; color: #475569; }
        .modal select, .modal textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; }
        .modal textarea { resize: none; height: 80px; }
        .btn-submit-report { padding: 12px; background: var(--primary); color: white; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-submit-report:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <div class="brand">
                <a href="home.html" title="Back to Dashboard" style="color: inherit; text-decoration: none; margin-right: 10px;">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <i class="fas fa-city"></i> SMART Citizen
            </div>
            
            <div class="user-controls">
                <span><i class="fas fa-user-circle"></i> <span id="user-name">User</span></span>
                <button class="btn-logout" onclick="logout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <div class="city-pulse">
            <div class="pulse-card"><div><i class="fas fa-wind pulse-good"></i> AQI</div><span class="pulse-val">42 (Good)</span></div>
            <div class="pulse-card"><div><i class="fas fa-car pulse-mod"></i> Traffic</div><span class="pulse-val">Moderate</span></div>
            <div class="pulse-card"><div><i class="fas fa-temperature-high"></i> Temp</div><span class="pulse-val">32°C</span></div>
        </div>

        <div class="service-grid">
            <div class="svc-btn" onclick="sendQuick('Hospitals')"><i class="fas fa-hospital" style="color:#ef4444"></i> Hospitals</div>
            <div class="svc-btn" onclick="sendQuick('Police')"><i class="fas fa-shield-alt" style="color:#3b82f6"></i> Police</div>
            <div class="svc-btn" onclick="sendQuick('Pharmacy')"><i class="fas fa-pills" style="color:#10b981"></i> Pharmacy</div>
            <div class="svc-btn" onclick="sendQuick('ATM')"><i class="fas fa-money-bill-wave" style="color:#10b981"></i> ATM/Bank</div>
            <div class="svc-btn" onclick="sendQuick('RTO Office')"><i class="fas fa-id-card" style="color:#f59e0b"></i> RTO/Govt</div>
            <div class="svc-btn" onclick="sendQuick('Metro Station')"><i class="fas fa-subway" style="color:#8b5cf6"></i> Metro</div>
            <div class="svc-btn" onclick="sendQuick('Bus Station')"><i class="fas fa-bus" style="color:#f59e0b"></i> Bus Stop</div>
            <div class="svc-btn" onclick="sendQuick('Public Toilet')"><i class="fas fa-restroom" style="color:#64748b"></i> Restroom</div>
            <div class="svc-btn" style="background:#fff1f2; border-color:#fda4af;" onclick="openReportModal()"><i class="fas fa-exclamation-triangle" style="color:#e11d48"></i> Report</div>
        </div>

        <div class="chat-container" id="chat-box">
            <div class="msg bot">👋 Welcome! I am your <b>SMART City App</b>.<br>I am connected to <b>Live Satellite Data</b>. Ask me anything!</div>
        </div>

        <div class="input-area">
            <button class="btn-sos-main" onclick="triggerSOS()" title="EMERGENCY SOS"><i class="fas fa-ambulance"></i></button>
            <input type="text" class="inp" id="userInput" placeholder="Type 'ATM near me'...">
            <button onclick="sendMessage()" style="background:none; border:none; color:var(--primary); font-size:1.2rem; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="map"></div>

    <div class="modal-overlay" id="reportModal">
        <div class="modal">
            <div class="modal-header">
                <span><i class="fas fa-exclamation-triangle" style="color:#e11d48"></i> Report Issue</span>
                <button class="btn-close" onclick="closeReportModal()">&times;</button>
            </div>
            <div>
                <label>Issue Type</label>
                <select id="issueType">
                    <option value="Road Damage">Road Damage</option>
                    <option value="Broken Streetlight">Broken Streetlight</option>
                    <option value="Water Leak">Water Leak</option>
                    <option value="Garbage Dump">Garbage Dump</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div>
                <label>Description</label>
                <textarea id="issueDesc" placeholder="Briefly describe the issue (e.g., Pothole in middle lane)..."></textarea>
            </div>
            <button class="btn-submit-report" onclick="submitReport()">Submit Report</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) document.getElementById('user-name').innerText = user.name.split(' ')[0];
        else window.location.href = 'index.html';

        function logout() { localStorage.removeItem('user'); window.location.href = 'index.html'; }

        const map = L.map('map', { zoomControl: false }).setView([17.3850, 78.4867], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let userLocation = null, markers = [];

        navigator.geolocation.watchPosition(pos => {
            userLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            if (!window.userMarker) {
                const pulseIcon = L.divIcon({ className: 'user-marker', html: '<div style="width:12px;height:12px;background:#2563eb;border-radius:50%;border:2px solid white;box-shadow:0 0 0 4px rgba(37,99,235,0.3);"></div>' });
                window.userMarker = L.marker([userLocation.lat, userLocation.lon], {icon: pulseIcon}).addTo(map);
                map.flyTo([userLocation.lat, userLocation.lon], 15);
            }
        });

        const chatBox = document.getElementById('chat-box');
        
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if(!text) return;
            addMsg('user', text);
            input.value = '';

            if(!userLocation) { addMsg('bot', "⚠️ Waiting for GPS..."); return; }

            addMsg('bot', '<i class="fas fa-satellite-dish fa-spin"></i> Processing...');

            try {
                const res = await fetch('/chat', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text, location: userLocation })
                });
                const data = await res.json();
                
                chatBox.removeChild(chatBox.lastChild); 

                markers.forEach(m => map.removeLayer(m)); markers = [];

                if(data.type === 'emergency') addMsg('emergency', `🚨 ${data.reply}`);
                else addMsg('bot', data.reply);

                if(data.data) {
                    data.data.forEach(item => {
                        setTimeout(() => renderCard(item), 100);
                        const marker = L.marker([item.lat, item.lon]).addTo(map).bindPopup(`<b>${item.name}</b><br>${item.type}`);
                        markers.push(marker);
                    });
                    if(data.data.length > 0) {
                        const bounds = L.latLngBounds(data.data.map(p => [p.lat, p.lon]));
                        map.fitBounds(bounds.pad(0.2));
                    }
                }
            } catch(e) { addMsg('bot', "❌ Server Error"); }
        }

        function renderCard(item) {
            const div = document.createElement('div');
            div.className = 'service-card';
            
            let statusHtml = "";
            let btnText = "Visit Site";
            let btnAction = `window.open('${item.link}', '_blank')`;
            let visitBtnStyle = "";

            // Logic to hide visit button for public toilets
            const type = item.type.toLowerCase();
            if (type.includes('toilet') || type.includes('restroom')) {
                visitBtnStyle = "display:none;";
            }

            if(item.beds) statusHtml = `<div class="live-status"><div class="dot dot-green"></div> <b>Capacity: ${item.beds}</b></div>`;
            else if(item.status) statusHtml = `<div class="live-status"><div class="dot dot-orange"></div> <b>${item.status}</b></div>`;
            else statusHtml = `<div class="live-status"><div class="dot dot-green"></div> <b>Open Now</b></div>`;

            div.innerHTML = `
                <div class="card-top">
                    <div class="card-name">${item.name}</div>
                    <span class="card-badge">${item.type}</span>
                </div>
                <div style="font-size:0.8rem; color:#64748b; margin-bottom:5px;">
                    <i class="fas fa-star" style="color:#eab308"></i> ${item.rating} • ${item.distance} km
                </div>
                ${statusHtml}
                <div class="card-actions">
                    <button class="btn-act btn-nav" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lon}')"><i class="fas fa-location-arrow"></i> Nav</button>
                    <button class="btn-act btn-visit" style="${visitBtnStyle}" onclick="${btnAction}"><i class="fas fa-external-link-alt"></i> ${btnText}</button>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addMsg(type, text) {
            const div = document.createElement('div'); div.className = `msg ${type}`; div.innerHTML = text;
            chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendQuick(txt) { document.getElementById('userInput').value = txt; sendMessage(); }
        
        function triggerSOS() {
            if(!userLocation) return alert("Waiting for GPS...");
            
            let emergencyContact = localStorage.getItem('emergencyContact');
            if (!emergencyContact) {
                emergencyContact = prompt("🚨 Set Emergency Contact\n\nEnter the WhatsApp number (with country code, e.g., 919876543210) to notify during an SOS:");
                if (emergencyContact) {
                    // Clean the number (remove spaces, +, dashes)
                    emergencyContact = emergencyContact.replace(/[^0-9]/g, '');
                    localStorage.setItem('emergencyContact', emergencyContact);
                }
            }
            
            const waUrl = emergencyContact 
                ? `https://wa.me/${emergencyContact}?text=🚨 EMERGENCY! Help needed at: http://maps.google.com/?q=${userLocation.lat},${userLocation.lon}`
                : `https://wa.me/?text=🚨 EMERGENCY! Help needed at: http://maps.google.com/?q=${userLocation.lat},${userLocation.lon}`;
                
            window.open(waUrl, '_blank');
            sendQuick("Emergency SOS");
        }

        function openReportModal() {
            if(!userLocation) return alert("Waiting for GPS...");
            document.getElementById('reportModal').style.display = 'flex';
        }

        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
            document.getElementById('issueDesc').value = '';
        }

        async function submitReport() {
            const type = document.getElementById('issueType').value;
            const desc = document.getElementById('issueDesc').value;
            if(!desc) return alert("Please provide a description of the issue.");
            
            const btn = document.querySelector('.btn-submit-report');
            btn.innerText = 'Submitting...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/report', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        issueType: type, 
                        description: desc, 
                        location: userLocation, 
                        user: user ? user.name : 'Anonymous' 
                    })
                });
                
                const data = await res.json();
                if(data.success) {
                    alert("Report submitted successfully! The government has been notified.");
                    closeReportModal();
                } else {
                    alert("Error: " + data.message);
                }
            } catch(e) {
                console.error(e);
                alert("Server error. Could not submit report.");
            }
            
            btn.innerText = 'Submit Report';
            btn.disabled = false;
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
