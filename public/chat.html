<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | SMART Citizen</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- LAYOUT & DESIGN --- */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; height: 60px; }
        .brand { font-size: 1.5rem; font-weight: bold; color: #007bff; display: flex; align-items: center; gap: 10px; }
        .nav-links a { text-decoration: none; color: #555; font-weight: 500; cursor: pointer; transition: 0.2s; margin-left: 20px; }
        .nav-links a:hover { color: #007bff; }
        .nav-item { display: flex; align-items: center; gap: 5px; }

        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); }
        .sidebar { width: 400px; background: #f8f9fa; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 900; height: 100%; }
        
        .status-panel { padding: 15px; background: white; border-bottom: 1px solid #eee; flex-shrink: 0; display:flex; justify-content:space-between; align-items:center; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }

        .chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; max-width: 85%; }
        .msg.bot { align-self: flex-start; background: white; border: 1px solid #eee; color: #333; }
        .msg.user { align-self: flex-end; background: #007bff; color: white; }
        .msg.emergency { align-self: flex-start; background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; animation: pulse 2s infinite; }

        .bottom-controls { flex-shrink: 0; background: white; border-top: 1px solid #ddd; }
        .quick-actions { padding: 10px 15px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #f0f0f0; }
        .chip { display: inline-block; padding: 6px 12px; background: #e9ecef; border-radius: 20px; margin-right: 8px; font-size: 0.8rem; cursor: pointer; color: #555; }
        .chip:hover { background: #dde2e6; color: #007bff; }

        .input-area { padding: 15px; display: flex; align-items: center; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-sos { background: #dc3545; color: white; font-size: 1.1rem; }
        .btn-sos:hover { background: #c82333; transform: scale(1.1); }
        .btn-send { background: #333; color: white; }

        #map { flex: 1; height: 100%; z-index: 1; }

        /* --- REPORT ISSUE BUTTON --- */
        .btn-report { background: #ff9800; color: white; border:none; padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        .btn-report:hover { background: #e68900; }

        /* --- CARD STYLES --- */
        .card { background: white; border: 1px solid #eee; padding: 12px; border-radius: 10px; font-size: 0.9rem; margin-top: 8px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card:hover { border-color: #007bff; box-shadow: 0 5px 15px rgba(0,123,255,0.15); }
        .card h4 { margin: 0; color: #007bff; font-size: 1rem; }
        .card-type { font-size: 0.75rem; background: #e3f2fd; color: #0d47a1; padding: 2px 8px; border-radius: 10px; }
        .card-meta { display: flex; justify-content: space-between; color: #666; font-size: 0.8rem; margin-top: 8px; }
        
        .card-actions { display: flex; gap: 8px; margin-top: 12px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-card { flex: 1; padding: 8px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .btn-dir { background: white; border: 1px solid #007bff; color: #007bff; }
        .btn-dir:hover { background: #f0f8ff; }
        .btn-book { background: #007bff; color: white; }
        .btn-gym { background: #673ab7; color: white; } 
        .btn-order { background: #28a745; color: white; }

        /* --- REPORT MODAL --- */
        #reportModal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.3); z-index:2000; width:300px; text-align:center; }
        .report-option { display:block; width:100%; padding:10px; margin:5px 0; border:1px solid #eee; border-radius:5px; cursor:pointer; text-align:left; }
        .report-option:hover { background:#f8f9fa; border-color:#007bff; }
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1500; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @media (max-width: 768px) { .main-container { flex-direction: column-reverse; } .sidebar { width: 100%; height: 50%; } #map { height: 50%; } }
    </style>
</head>
<body>

    <header>
        <div class="brand"><i class="fas fa-city"></i> SMART Citizen</div>
        <div class="nav-links">
            <span id="welcomeMsg" style="margin-right:10px; font-size:0.9rem; color:#666;"></span>
            <a onclick="clearChat()"><i class="fas fa-trash-alt"></i> Clear</a>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="#" id="authBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="status-panel">
                <div>
                    <span class="badge badge-success">Online</span>
                    <span id="gps-badge" class="badge badge-warning">Locating...</span>
                </div>
                <button class="btn-report" onclick="openReportModal()">⚠️ Report Issue</button>
            </div>
            
            <div class="chat-messages" id="chat-box">
                <div class="msg bot">Hello! Finding your location automatically... 🌍</div>
            </div>
            
            <div class="bottom-controls">
                <div class="quick-actions">
                    <span class="chip" onclick="sendQuick('hospitals near me')"><i class="fas fa-hospital"></i> Hospitals</span>
                    <span class="chip" onclick="sendQuick('pharmacy nearby')"><i class="fas fa-pills"></i> Pharmacy</span>
                    <span class="chip" onclick="sendQuick('malls near me')"><i class="fas fa-shopping-bag"></i> Malls</span>
                    <span class="chip" onclick="sendQuick('gyms near me')"><i class="fas fa-dumbbell"></i> Gyms</span>
                </div>
                <div class="input-area">
                    <button class="btn-icon btn-sos" onclick="triggerSOS()" title="Emergency SOS"><i class="fas fa-ambulance"></i></button>
                    <input type="text" id="userInput" placeholder="Type here..." autocomplete="off">
                    <button class="btn-icon btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        <div id="map"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeReportModal()"></div>
    <div id="reportModal">
        <h3>⚠️ Report City Issue</h3>
        <p style="color:#666; font-size:0.9rem;">Select the issue at your current location:</p>
        <button class="report-option" onclick="submitReport('Pothole / Road Damage', '🕳️')">🕳️ Pothole / Road Damage</button>
        <button class="report-option" onclick="submitReport('Garbage Dump', '🗑️')">🗑️ Garbage Dump</button>
        <button class="report-option" onclick="submitReport('Street Light Broken', '💡')">💡 Street Light Broken</button>
        <button class="report-option" onclick="submitReport('Water Leakage', '💧')">💧 Water Leakage</button>
        <button style="margin-top:10px; width:100%; padding:8px;" onclick="closeReportModal()">Cancel</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const userStr = localStorage.getItem('user');
        const authBtn = document.getElementById('authBtn');
        const welcomeMsg = document.getElementById('welcomeMsg');

        if (userStr) {
            const user = JSON.parse(userStr);
            welcomeMsg.innerText = `Hi, ${user.name}`;
            authBtn.onclick = () => { localStorage.removeItem('user'); window.location.href = 'login.html'; };
        } else {
            welcomeMsg.innerText = "Guest Mode";
            authBtn.innerHTML = 'Login';
            authBtn.href = "login.html";
        }

        const map = L.map('map').setView([17.3850, 78.4867], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userLocation = null;
        let resultMarkers = [];

        function syncGPS() {
            const badge = document.getElementById('gps-badge');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    L.marker([userLocation.lat, userLocation.lon]).addTo(map).bindPopup("You are here").openPopup();
                    map.setView([userLocation.lat, userLocation.lon], 14);
                    badge.className = "badge badge-success";
                    badge.innerHTML = "GPS Synced";
                    addMessage('bot', "Location Found! 📍 Try asking for 'Vishal Mart' or 'Hospitals'.");
                }, () => {
                    badge.innerHTML = "GPS Failed";
                });
            }
        }
        syncGPS();

        const chatBox = document.getElementById('chat-box');
        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function clearChat() { chatBox.innerHTML = '<div class="msg bot">Chat cleared.</div>'; resultMarkers.forEach(m => map.removeLayer(m)); }
        function sendQuick(text) { document.getElementById('userInput').value = text; sendMessage(); }
        function triggerSOS() { document.getElementById('userInput').value = "Emergency accident help"; sendMessage(); }

        // --- REPORT ISSUE LOGIC ---
        function openReportModal() {
            if(!userLocation) { alert("Please wait for GPS to sync!"); return; }
            document.getElementById('reportModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
        function submitReport(issue, icon) {
            closeReportModal();
            addMessage('user', `Reported: ${issue}`);
            addMessage('bot', `✅ Complaint Registered! ID: #TKT-${Math.floor(Math.random()*9000)}. Authorities have been notified.`);
            
            // Add a RED FLAG on the map
            const flagIcon = L.divIcon({ html: `<div style="font-size:24px;">🚩</div>`, className: 'dummy' });
            L.marker([userLocation.lat, userLocation.lon], {icon: flagIcon}).addTo(map)
             .bindPopup(`<b>${icon} ${issue}</b><br>Reported Just Now`).openPopup();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage('user', text);
            input.value = '';

            if (!userLocation) { setTimeout(() => addMessage('bot', "⚠️ Waiting for GPS..."), 500); return; }

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, location: userLocation })
                });
                const data = await res.json();

                if (data.type === 'recommendation' || data.type === 'emergency') {
                    addMessage(data.type, (data.type === 'emergency' ? "🚨 " : "") + data.reply);
                    resultMarkers.forEach(m => map.removeLayer(m));
                    
                    data.data.forEach(item => {
                        let actionBtn = "";
                        const typeLower = item.type.toLowerCase();
                        
                        if (typeLower === "hospital") {
                            actionBtn = `<button class="btn-card btn-book" onclick="alert('Appointment Confirmed!')"><i class="fas fa-calendar-check"></i> Book Now</button>`;
                        } else if (typeLower === "pharmacy") {
                            actionBtn = `<button class="btn-card btn-order" onclick="alert('Medicine Order Placed! Delivery in 30 mins.')"><i class="fas fa-motorcycle"></i> Order Now</button>`;
                        } else if (typeLower === "gym") {
                            actionBtn = `<button class="btn-card btn-gym" onclick="alert('Trial Class Booked!')"><i class="fas fa-dumbbell"></i> Book Trial</button>`;
                        } else {
                            actionBtn = ``; 
                        }

                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between;">
                                <h4>${item.name}</h4>
                                <span class="card-type">${item.type}</span>
                            </div>
                            <div class="card-meta">
                                <span>⭐ ${item.rating}</span>
                                <span>📍 ${item.distance} km</span>
                            </div>
                            <div style="margin-top:5px; color:#555; font-size:0.85rem;">${item.location}</div>
                            
                            <div class="card-actions">
                                <button class="btn-card btn-dir" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lon}', '_blank')">
                                    <i class="fas fa-directions"></i> Direction
                                </button>
                                ${actionBtn}
                            </div>
                        `;
                        card.onclick = (e) => {
                            if(e.target.tagName !== 'BUTTON') {
                                map.flyTo([item.lat, item.lon], 16);
                                L.popup().setLatLng([item.lat, item.lon]).setContent(item.name).openOn(map);
                            }
                        };
                        chatBox.appendChild(card);
                        resultMarkers.push(L.marker([item.lat, item.lon]).addTo(map).bindPopup(item.name));
                    });
                } else {
                    addMessage('bot', data.reply);
                }
            } catch (err) { addMessage('bot', "Server Error."); }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
