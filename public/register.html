<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Join the Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Outfit', sans-serif; background: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: float 10s infinite alternate; }
        .orb-1 { width: 300px; height: 300px; background: #10b981; top: -50px; right: -50px; }
        .orb-2 { width: 200px; height: 200px; background: #3b82f6; bottom: -50px; left: -50px; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 50px); } }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
            padding: 50px; width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); z-index: 10;
        }
        
        h2 { color: white; font-size: 2rem; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { color: #cbd5e1; font-size: 0.85rem; display: block; margin-bottom: 8px; margin-left: 5px; }
        .inp { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 1rem; }
        .inp:focus { border-color: #10b981; background: rgba(0,0,0,0.5); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        .btn-register { width: 100%; padding: 14px; background: linear-gradient(90deg, #10b981, #059669); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-register:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        .footer-link { margin-top: 25px; display: block; color: #94a3b8; font-size: 0.9rem; text-decoration: none; }
        .footer-link span { color: #10b981; font-weight: 600; }
        .footer-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-panel">
        <h2>Join SMART Citizen</h2>
        <p>Create your unified city identity.</p>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" class="inp" id="name" placeholder="John Doe">
        </div>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" class="inp" id="email" placeholder="citizen@smartcity.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" class="inp" id="password" placeholder="Create a password">
        </div>

        <button class="btn-register" onclick="handleRegister()">Create Account</button>

        <a href="login.html" class="footer-link">Already a member? <span>Sign In</span></a>
    </div>

    <script>
        async function handleRegister() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(!name || !email || !password) {
                alert("Please fill in all fields");
                return;
            }

            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            
            if(data.success) {
                alert("Account Created! Redirecting to Login...");
                window.location.href = 'login.html';
            } else {
                alert("Error: " + data.message);
            }
        }
    </script>
</body>
</html>
